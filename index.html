ctions{grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;padding:6px;border-radius:12px;width:100%;max-width:100%;min-width:0;overflow:hidden}body.mobilePortraitUI .actions button{font-size:12px;padding:8px 4px;border-radius:9px;min-height:36px;min-width:0}body.mobilePortraitUI .judgePanel.show{max-height:calc(100svh - 140px);overflow:auto;padding:7px;border-radius:12px}body.mobilePortraitUI .judgeTitle{font-size:15px}body.mobilePortraitUI .judgeHelp{font-size:12px;line-height:1.35}body.mobilePortraitUI .judgeHand{padding:6px;gap:4px}body.mobilePortraitUI .voteRow{grid-template-columns:1fr;gap:5px;font-size:12px}body.mobilePortraitUI .voteActions{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}body.mobilePortraitUI .voteActions button{font-size:12px;padding:8px 4px}body.mobilePortraitUI .resultPanel.show{max-height:calc(100svh - 80px);overflow:auto;padding:10px}body.mobilePortraitUI .winnerTitle{font-size:24px}body.mobilePortraitUI .winnerSub{font-size:14px}

<body>
  <div id="cutInOverlay" class="cutInOverlay"><div id="cutInText" class="cutInText"></div></div>

  <section id="titleScreen" class="screen centerScreen">
    <div class="card">
      <h1>ひらがな麻雀<span class="version">v1.01</span></h1>
      <div class="box" style="margin-bottom:12px;"><label class="toggleLabel"><input id="mobileUiToggle" type="checkbox" /> スマホ縦UIを使う</label></div>
      <label>自分の名前<input id="nameInput" value="あなた" maxlength="12" /></label>
      <label>部屋ID<input id="roomInput" value="testroom" maxlength="32" /></label>
      <div class="buttons"><button id="hostBtn" class="good">ホスト</button><button id="joinBtn" class="blue">参加</button></div>
      <div id="titleStatus" class="status">未接続</div>
    </div>
  </section>

  <section id="lobbyScreen" class="screen centerScreen hidden">
    <div class="card">
      <h2>待機画面</h2>
      <div class="box"><div class="row"><strong>部屋ID</strong><span id="roomLabel">-</span></div><div class="row"><strong>接続状態</strong><span id="connectionLabel">-</span></div></div>
      <div class="box" style="margin-top:14px;"><label class="toggleLabel"><input id="mobileUiToggleLobby" type="checkbox" /> スマホ縦UIを使う</label></div>
      <div class="box" style="margin-top:14px;"><div class="row"><strong>現在の参加者</strong><span id="countLabel">0人</span></div><div id="participants" class="participants"></div></div>
      <div class="box" style="margin-top:14px;"><div class="row"><strong>モード</strong><select id="gameModeInput"><option value="hiragana">ひらがな</option><option value="english">英語</option></select></div></div>
      <div class="box" style="margin-top:14px;"><div class="row"><strong>上がり牌数</strong><input id="winningTileCountInput" class="inlineInput" type="number" min="3" max="30" value="14" /></div></div>
      <div class="box" style="margin-top:14px;"><div class="row"><strong>何点取ったら勝ち</strong><input id="targetScoreInput" class="inlineInput" type="number" min="1" max="20" value="3" /></div></div>
      <div class="box" style="margin-top:14px;"><div class="row"><strong>ロン受付時間</strong><span><input id="reactionSecondsInput" class="inlineInput" type="number" min="1" max="15" value="5" /> 秒</span></div></div>
      <div class="buttons"><button id="addCpuBtn" class="blue">CPUを追加</button><button id="startGameBtn" class="good">ゲームスタート</button><button id="backTitleBtn">タイトルへ</button><button id="disconnectBtn" class="danger">切断</button></div>
      <div id="lobbyStatus" class="status">待機中</div>
    </div>
  </section>

  <section id="gameScreen" class="screen hidden">
    <div class="gameRoot">
      <div class="topbar"><div id="gameStatus" class="mainStatus">対局中</div><div id="myDiscardTop" class="myDiscardTop"><div class="myDiscardTopTitle">自分の捨て牌</div><div id="myDiscardTopTiles" class="tileRow"></div></div><div id="wallInfo" class="smallInfo">山: -</div><div id="lastDiscardInfo" class="smallInfo">直前: -</div></div>
      <div id="players" class="players"></div>
      <div class="actions">
        <button id="discardBtn" class="blue">出す</button>
        <button id="ronBtn" class="danger">ロン</button>
        <button id="tsumoBtn" class="good">ツモ</button>
        <button id="nextRoundBtn" class="yellow">次へ</button>
        <button id="titleFromGameBtn">タイトル</button>
        <button id="disconnectFromGameBtn" class="danger">切断</button>
      </div>
      <div class="myHandPanel">
        <div class="myHandHeader"><span id="myHandTitle">自分の手札</span><span id="myTurnLabel">-</span></div>
        <div id="myHand" class="myHand"></div>
        <div class="handControls">
          <button id="separatorAddBtn" class="yellow">区切り追加</button>
          <button id="separatorRemoveBtn">区切り削除</button>
          <button id="moveLeftBtn" class="blue">←</button>
          <button id="moveRightBtn" class="blue">→</button>
        </div>
      </div>
      <div id="judgePanel" class="judgePanel"><div id="judgeTitle" class="judgeTitle"></div><div class="judgeHelp">公開手札を見て、上がりかどうかを全員で判断してください。</div><div id="judgeHand" class="judgeHand"></div><div id="voteRows" class="voteRows"></div></div>

    </div>
  </section>

  <script>

      myHandTitle: document.getElementById("myHandTitle"), myTurnLabel: document.getElementById("myTurnLabel"), myHand: document.getElementById("myHand"),
      judgePanel: document.getElementById("judgePanel"), judgeTitle: document.getElementById("judgeTitle"), judgeHand: document.getElementById("judgeHand"), voteRows: document.getElementById("voteRows"),

    function getWsBase() { const isLocalFile = location.protocol === "file:"; const isLocalHost = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.hostname === ""; return (isLocalFile || isLocalHost) ? WS_BASE_LOCAL : WS_BASE_PROD; }
    function applyUrlParams() { const params = new URLSearchParams(location.search); const room = params.get("room"); const name = params.get("name"); const mobile = params.get("mobile") || params.get("mobileUi"); if (room) el.roomInput.value = normalizeRoom(room); if (name) el.nameInput.value = normalizeName(name); if (mobile) setMobilePortraitUi(["1", "true", "on", "yes"].includes(mobile.toLowerCase())); }
    function setMobilePortraitUi(enabled) { document.body.classList.toggle("mobilePortraitUI", Boolean(enabled)); localStorage.setItem(MOBILE_UI_STORAGE_KEY, enabled ? "1" : "0"); el.mobileUiToggle.checked = Boolean(enabled); el.mobileUiToggleLobby.checked = Boolean(enabled); }
    function loadMobilePortraitUi() { setMobilePortraitUi(localStorage.getItem(MOBILE_UI_STORAGE_KEY) === "1"); }
    function isSeparator(item) { return (item?.kind || "tile") === "separator"; }
    function itemText(item) { return typeof item === "string" ? item : (item?.text || ""); }
    function itemKind(item) { return typeof item === "string" ? "tile" : (item?.kind || "tile"); }
    function selectedItem() { return state.serverState?.myHand?.find(x => x.id === state.selectedTileId) || null; }
    function selectedIsSeparator() { return isSeparator(selectedItem()); }
    function activeOwnHandControls() { const s = state.serverState; return Boolean(s && s.phase !== "lobby" && s.phase !== "round_over"); }
    function claimWindowActive() { return Boolean(state.serverState?.claimWindow); }
    function declaredRon() { const s = state.serverState; return Boolean(s?.claimWindow?.ronClaimantIds?.includes(state.playerId)); }

    function connectAs() {
      disconnect(false);
      state.roomId = normalizeRoom(el.roomInput.value);
      el.roomInput.value = state.roomId;
      const name = normalizeName(el.nameInput.value);
      el.nameInput.value = name;
      const url = getWsBase() + encodeURIComponent(state.roomId);
      el.titleStatus.textContent = `接続中: ${url}`;
      const ws = new WebSocket(url);
      state.ws = ws;
      ws.onopen = () => { state.connected = true; setScreen("lobby"); setLobbyStatus("接続成功。join を送信しました。"); send({ t: "join", name }); };
      ws.onmessage = event => {
        let message;
        try { message = JSON.parse(event.data); } catch { setLobbyStatus("サーバーから不正なJSONを受信しました。"); return; }
        if (message.t === "hello") { state.playerId = message.playerId; setLobbyStatus(`接続ID: ${state.playerId}`); return; }
        if (message.t === "state") {
          const previous = state.serverState;
          state.serverState = message.state;
          if (state.selectedTileId && !message.state.myHand?.some(tile => tile.id === state.selectedTileId)) state.selectedTileId = null;
          maybeShowStateCutIn(previous, message.state);
          renderByPhase();
          return;
        }
        if (message.t === "error") showError(message.message);
      };
      ws.onerror = () => { el.titleStatus.textContent = "WebSocketエラー。Wranglerが起動中か確認してください。"; setLobbyStatus("WebSocketエラー。Wranglerが起動中か確認してください。"); };
      ws.onclose = () => { state.connected = false; renderByPhase(); el.titleStatus.textContent = "切断されました。再接続してください。"; };
    }

    function disconnect(goTitle = true) { if (state.ws) { try { state.ws.close(); } catch {} } state.ws = null; state.connected = false; state.serverState = null; state.playerId = null; state.selectedTileId = null; state.lastCutInKey = ""; if (goTitle) setScreen("title"); }
    function confirmGoTitle() { if (confirm("タイトルへ戻ります。接続中の部屋から切断されます。よろしいですか？")) disconnect(true); }
    function confirmDisconnect() { if (confirm("接続を切断します。よろしいですか？")) disconnect(true); }
    function send(payload) { if (!state.ws || state.ws.readyState !== WebSocket.OPEN) { showError("未接続です。"); return false; } state.ws.send(JSON.stringify(payload)); return true; }
    function getMe() { const s = state.serverState; if (!s || !state.playerId) return null; return s.players.find(p => p.playerId === state.playerId) || null; }
    function isHost() { return Boolean(getMe()?.isHost); }
    function isMyTurn() { const s = state.serverState; return Boolean(s && s.currentPlayerId === state.playerId && s.phase === "play" && !claimWindowActive()); }
    function canRon() { const s = state.serverState; return Boolean(s && s.phase === "play" && s.claimWindow && s.lastDiscarderId && s.lastDiscarderId !== state.playerId && !declaredRon()); }
    function setLobbyStatus(text) { el.lobbyStatus.textContent = text; }
    function showError(message) { const text = `エラー: ${message}`; setLobbyStatus(text); el.gameStatus.textContent = text; console.error(text); }

    function renderByPhase() { const s = state.serverState; if (!s) { if (state.connected) setScreen("lobby"); return; } if (s.phase === "lobby") { setScreen("lobby"); renderLobby(); } else { setScreen("game"); renderGame(); } }
    function renderLobby() {
      const s = state.serverState;
      el.roomLabel.textContent = state.roomId; el.connectionLabel.textContent = state.connected ? "接続中" : "未接続";
      if (!s) { el.countLabel.textContent = "0人"; el.participants.innerHTML = ""; el.addCpuBtn.disabled = true; el.startGameBtn.disabled = true; el.gameModeInput.disabled = true; el.winningTileCountInput.disabled = true; el.targetScoreInput.disabled = true; el.reactionSecondsInput.disabled = true; return; }
      el.countLabel.textContent = `${s.players.length}人`; el.gameModeInput.value = s.gameMode || "hiragana"; el.gameModeInput.disabled = !isHost() || s.phase !== "lobby";
      el.winningTileCountInput.value = s.winningTileCount ?? 14; el.winningTileCountInput.disabled = !isHost() || s.phase !== "lobby";
      el.targetScoreInput.value = s.targetScore; el.targetScoreInput.disabled = !isHost() || s.phase !== "lobby";
      el.reactionSecondsInput.value = s.reactionSeconds ?? 5; el.reactionSecondsInput.disabled = !isHost() || s.phase !== "lobby";
      el.addCpuBtn.disabled = !isHost() || s.phase !== "lobby" || s.players.length >= 4; el.startGameBtn.disabled = !isHost() || s.phase !== "lobby" || s.players.length < 2; el.addCpuBtn.textContent = s.players.length >= 4 ? "CPU追加上限" : "CPUを追加";
      el.participants.innerHTML = ""; s.players.forEach(player => { const item = document.createElement("div"); item.className = "participant"; const badges = []; if (player.isHost) badges.push("ホスト"); if (player.isCpu) badges.push("CPU"); if (!player.connected) badges.push("切断"); if (player.playerId === state.playerId) badges.push("自分"); item.innerHTML = `<span>${escapeHtml(player.name)}</span><span>${badges.join(" / ") || "参加"}</span>`; el.participants.appendChild(item); });
    }

    function renderGame() {
      const s = state.serverState; if (!s) return;
      if (s.claimWindow) { const rons = s.claimWindow.ronClaimantIds?.map(playerNameById).join("、") || "なし"; el.gameStatus.textContent = `ロン受付中です。ロン: ${rons}`; }
      else if (s.phase === "judge") { const claimant = playerNameById(s.judge?.claimantId); const queue = s.judge?.ronQueueTotal ? ` ${s.judge.ronQueueIndex}/${s.judge.ronQueueTotal}` : ""; el.gameStatus.textContent = `${claimant} が${s.judge?.claimType}宣言。ジャッジ中です。${queue}`; }
      else if (s.phase === "round_over") { el.gameStatus.textContent = s.roundMessage || "ラウンド終了"; }
      else { const currentPlayer = s.players.find(p => p.playerId === s.currentPlayerId); el.gameStatus.textContent = currentPlayer ? `${currentPlayer.name} の手番です${isMyTurn() ? "。1枚出してください。" : "。"}` : "対局中"; }
      el.wallInfo.textContent = `山: ${s.wallCount}枚`; el.lastDiscardInfo.textContent = s.lastDiscardTile ? `直前: ${s.lastDiscardTile} / ${playerNameById(s.lastDiscarderId)}` : "直前: なし";
      renderMyDiscardTop(); renderPlayers(); renderMyHand(); renderGameActions(); renderJudge(); renderResult();
    }

    function renderMyDiscardTop() { const s = state.serverState; el.myDiscardTopTiles.innerHTML = ""; const me = getMe(); const discards = me?.discards || []; if (!discards.length) { el.myDiscardTopTiles.textContent = "なし"; return; } discards.forEach((text, index) => { const tile = makeTile({ text, kind: "tile" }, "small"); const isClaimTarget = s.claimWindow && me.playerId === s.lastDiscarderId && index === discards.length - 1 && text === s.lastDiscardTile; if (isClaimTarget) tile.classList.add("claimTarget"); el.myDiscardTopTiles.appendChild(tile); }); }
    function renderPlayers() { const s = state.serverState; el.players.innerHTML = ""; s.players.forEach(player => { const panel = document.createElement("div"); panel.className = "player"; if (player.playerId === s.currentPlayerId && s.phase === "play") panel.classList.add("turn"); if (player.playerId === state.playerId) panel.classList.add("me"); if (player.playerId === s.matchWinnerId) panel.classList.add("winner"); const header = document.createElement("div"); header.className = "playerHeader"; const badges = []; if (player.playerId === state.playerId) badges.push("自分"); if (player.isHost) badges.push("ホスト"); if (player.isCpu) badges.push("CPU"); if (player.playerId === s.currentPlayerId && s.phase === "play") badges.push("手番"); if (player.playerId === s.matchWinnerId) badges.push("勝利"); if (s.claimWindow?.ronClaimantIds?.includes(player.playerId)) badges.push("ロン宣言"); const sep = player.separatorCount ? ` / 区切り${player.separatorCount}` : ""; header.innerHTML = `<span>${escapeHtml(player.name)} / ${player.score}点 <span class="handInfo">/ 手牌${player.handCount}枚${sep}</span></span><span class="badge">${badges.join(" / ") || "待機"}</span>`; panel.appendChild(header); panel.appendChild(createDiscardSection(player)); el.players.appendChild(panel); }); }
    function createDiscardSection(player) { const s = state.serverState; const section = document.createElement("div"); section.className = "section"; section.innerHTML = `<div class="sectionTitle">捨て牌</div>`; const row = document.createElement("div"); row.className = "tileRow"; if (!player.discards.length) row.textContent = "なし"; else player.discards.forEach((text, index) => { const tile = makeTile({ text, kind: "tile" }, "small"); const isClaimTarget = s.claimWindow && player.playerId === s.lastDiscarderId && index === player.discards.length - 1 && text === s.lastDiscardTile; if (isClaimTarget) tile.classList.add("claimTarget"); row.appendChild(tile); }); section.appendChild(row); return section; }

    function renderMyHand() { const s = state.serverState; const realCount = s.myHand.filter(x => !isSeparator(x)).length; const sepCount = s.myHand.length - realCount; const sepText = sepCount ? ` / 区切り${sepCount}` : ""; const winText = s.winningTileCount ? ` / 上がり${s.winningTileCount}牌` : ""; el.myHandTitle.textContent = `自分の手札 ${realCount}枚${sepText}${winText}`; el.myTurnLabel.textContent = isMyTurn() ? "あなたの手番" : s.phase === "judge" ? "ジャッジ中" : claimWindowActive() ? "受付中" : "待機中"; el.myHand.innerHTML = ""; s.myHand.forEach((tile, index) => { const tileEl = makeTile(tile, "myTile"); if (tile.id === state.selectedTileId) tileEl.classList.add("selected"); tileEl.draggable = true; tileEl.addEventListener("dragstart", event => { state.handDrag = { fromIndex: index }; event.dataTransfer.effectAllowed = "move"; event.dataTransfer.setData("text/plain", String(index)); tileEl.classList.add("dragging"); }); tileEl.addEventListener("dragover", event => { event.preventDefault(); event.dataTransfer.dropEffect = "move"; tileEl.classList.add("dragOver"); }); tileEl.addEventListener("dragleave", () => tileEl.classList.remove("dragOver")); tileEl.addEventListener("drop", event => { event.preventDefault(); tileEl.classList.remove("dragOver"); const fromIndex = Number(event.dataTransfer.getData("text/plain") || state.handDrag?.fromIndex); if (!Number.isFinite(fromIndex) || fromIndex === index) return; send({ t: "reorder_hand", fromIndex, toIndex: index }); }); tileEl.addEventListener("dragend", () => { state.handDrag = null; tileEl.classList.remove("dragging"); }); tileEl.addEventListener("click", () => { state.selectedTileId = tile.id; renderMyHand(); renderGameActions(); }); el.myHand.appendChild(tileEl); }); }
    function selectedIndex() { return state.serverState?.myHand?.findIndex(x => x.id === state.selectedTileId) ?? -1; }
    function moveSelected(offset) { const fromIndex = selectedIndex(); if (fromIndex < 0) { el.gameStatus.textContent = "移動する牌を選んでください。"; return; } const toIndex = fromIndex + offset; if (toIndex < 0 || toIndex >= state.serverState.myHand.length) return; send({ t: "reorder_hand", fromIndex, toIndex }); }
    function renderGameActions() { const s = state.serverState; const canMove = activeOwnHandControls() && selectedIndex() >= 0; el.discardBtn.disabled = !(isMyTurn() && state.selectedTileId && !selectedIsSeparator()); el.ronBtn.disabled = !canRon(); el.ronBtn.textContent = declaredRon() ? "ロン済" : "ロン"; el.tsumoBtn.disabled = !isMyTurn(); el.nextRoundBtn.disabled = !(isHost() && s.phase === "round_over" && !s.matchWinnerId); el.separatorAddBtn.disabled = !activeOwnHandControls(); el.separatorRemoveBtn.disabled = !(activeOwnHandControls() && selectedIsSeparator()); el.moveLeftBtn.disabled = !canMove || selectedIndex() <= 0; el.moveRightBtn.disabled = !canMove || selectedIndex() >= (s.myHand.length - 1); el.rematchBtn.disabled = !isHost(); el.backLobbyResultBtn.disabled = !isHost(); if (claimWindowActive()) { el.discardBtn.disabled = true; el.tsumoBtn.disabled = true; } }

    function renderJudge() { const s = state.serverState; const show = s.phase === "judge" && s.judge; el.judgePanel.classList.toggle("show", Boolean(show)); if (!show) { el.judgeTitle.textContent = ""; el.judgeHand.innerHTML = ""; el.voteRows.innerHTML = ""; return; } const judge = s.judge; const queueText = judge.ronQueueTotal ? ` (${judge.ronQueueIndex}/${judge.ronQueueTotal})` : ""; el.judgeTitle.textContent = `${playerNameById(judge.claimantId)} / ${judge.claimType}${queueText} / 公開手札`; el.judgeHand.innerHTML = ""; judge.revealedHand.forEach(item => el.judgeHand.appendChild(makeTile(item, ""))); el.voteRows.innerHTML = ""; judge.requiredVoterIds.forEach(voterId => { const row = document.createElement("div"); row.className = "voteRow"; const vote = judge.votes[voterId] || "未投票"; row.innerHTML = `<div>${escapeHtml(playerNameById(voterId))}: ${escapeHtml(vote)}</div>`; const actions = document.createElement("div"); actions.className = "voteActions"; if (voterId === state.playerId) { actions.appendChild(voteButton("上がり", "good")); actions.appendChild(voteButton("異議あり", "blue")); actions.appendChild(voteButton("ダメだろ", "danger")); } else { const wait = document.createElement("span"); wait.textContent = "投票待ち"; actions.appendChild(wait); } row.appendChild(actions); el.voteRows.appendChild(row); }); }
    function voteButton(vote, className) { const btn = document.createElement("button"); btn.className = className; btn.textContent = vote; btn.addEventListener("click", () => { if (vote === "異議あり") showCutIn("異議あり！！", "igi"); send({ t: "judge_vote", vote }); }); return btn; }
    function renderResult() { const s = state.serverState; const show = s.phase === "round_over" && Boolean(s.matchWinnerId); el.resultPanel.classList.toggle("show", show); if (!show) { el.winnerTitle.textContent = ""; el.winnerSub.textContent = ""; return; } const winner = s.players.find(p => p.playerId === s.matchWinnerId); el.winnerTitle.textContent = `🏆 ${winner?.name || "不明"} の勝ち！`; el.winnerSub.textContent = `${winner?.score ?? "?"}点 / 勝利条件 ${s.targetScore}点`; }
    function makeTile(item, extraClass = "") { const kind = itemKind(item); const text = itemText(item); const div = document.createElement("div"); div.className = `tile ${kind === "separator" ? "separator" : ""} ${extraClass}`.trim(); if (kind !== "separator" && ["ゃ", "ゅ", "ょ", "っ"].includes(text)) div.classList.add("smallKana"); if (kind !== "separator" && text.length >= 2 && !["が","ぎ","ぐ","げ","ご","ざ","じ","ず","ぜ","ぞ","だ","ぢ","づ","で","ど","ば","び","ぶ","べ","ぼ","ぱ","ぴ","ぷ","ぺ","ぽ"].includes(text)) div.classList.add("wordTile"); div.textContent = kind === "separator" ? "" : text; div.title = kind === "separator" ? "区切り牌" : text; return div; }
    function playerNameById(playerId) { const p = state.serverState?.players.find(x => x.playerId === playerId); return p ? p.name : "不明"; }
    function maybeShowStateCutIn(previous, current) { if (!current?.judge) return; const key = `${current.judge.claimantId}:${current.judge.claimType}:${current.judge.ronQueueIndex ?? "single"}`; const previousKey = previous?.judge ? `${previous.judge.claimantId}:${previous.judge.claimType}:${previous.judge.ronQueueIndex ?? "single"}` : ""; if (key !== previousKey && state.lastCutInKey !== key) { state.lastCutInKey = key; showCutIn(current.judge.claimType === "ツモ" ? "ツモ" : "ロン"); } }
    function showCutIn(text, variant = "normal") { if (state.cutInTimer) clearTimeout(state.cutInTimer); el.cutInText.textContent = text; el.cutInText.className = variant === "igi" ? "cutInText igi" : "cutInText"; el.cutInOverlay.classList.remove("show"); void el.cutInOverlay.offsetWidth; el.cutInOverlay.classList.add("show"); state.cutInTimer = setTimeout(() => { el.cutInOverlay.classList.remove("show"); state.cutInTimer = null; }, 2000); }
    function escapeHtml(value) { return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }

    el.mobileUiToggle.addEventListener("change", () => setMobilePortraitUi(el.mobileUiToggle.checked));
    el.mobileUiToggleLobby.addEventListener("change", () => setMobilePortraitUi(el.mobileUiToggleLobby.checked));
    el.hostBtn.addEventListener("click", connectAs);
    el.joinBtn.addEventListener("click", connectAs);
    el.backTitleBtn.addEventListener("click", confirmGoTitle);
    el.disconnectBtn.addEventListener("click", confirmDisconnect);
    el.titleFromGameBtn.addEventListener("click", confirmGoTitle);
    el.disconnectFromGameBtn.addEventListener("click", confirmDisconnect);
    el.addCpuBtn.addEventListener("click", () => send({ t: "add_cpu" }));
    el.startGameBtn.addEventListener("click", () => send({ t: "start_game" }));
    el.nextRoundBtn.addEventListener("click", () => send({ t: "next_round" }));
    el.rematchBtn.addEventListener("click", () => send({ t: "start_game" }));
    el.backLobbyResultBtn.addEventListener("click", () => send({ t: "back_lobby" }));
    el.discardBtn.addEventListener("click", () => { if (!state.selectedTileId) { el.gameStatus.textContent = "出す牌を1枚選んでください。"; return; } if (selectedIsSeparator()) { el.gameStatus.textContent = "区切り牌は捨てられません。"; return; } if (!isMyTurn()) { el.gameStatus.textContent = "まだあなたの手番ではありません。"; return; } send({ t: "discard", tileId: state.selectedTileId }); });
    el.ronBtn.addEventListener("click", () => { if (canRon()) send({ t: "ron" }); });
    el.tsumoBtn.addEventListener("click", () => { if (isMyTurn()) { showCutIn("ツモ"); send({ t: "tsumo_win" }); } });
    el.separatorAddBtn.addEventListener("click", () => send({ t: "add_separator" }));
    el.separatorRemoveBtn.addEventListener("click", () => { if (!selectedIsSeparator()) { el.gameStatus.textContent = "削除する区切り牌を選んでください。"; return; } send({ t: "remove_separator", tileId: state.selectedTileId }); state.selectedTileId = null; });
    el.moveLeftBtn.addEventListener("click", () => moveSelected(-1));
    el.moveRightBtn.addEventListener("click", () => moveSelected(1));
    el.gameModeInput.addEventListener("change", () => { send({ t: "set_game_mode", gameMode: el.gameModeInput.value }); });
    el.winningTileCountInput.addEventListener("change", () => { const count = Math.max(3, Math.min(30, Math.floor(Number(el.winningTileCountInput.value) || 14))); el.winningTileCountInput.value = String(count); send({ t: "set_winning_tile_count", winningTileCount: count }); });
    el.targetScoreInput.addEventListener("change", () => { const score = Math.max(1, Math.min(20, Math.floor(Number(el.targetScoreInput.value) || 3))); el.targetScoreInput.value = String(score); send({ t: "set_target_score", targetScore: score }); });
    el.reactionSecondsInput.addEventListener("change", () => { const seconds = Math.max(1, Math.min(15, Math.floor(Number(el.reactionSecondsInput.value) || 5))); el.reactionSecondsInput.value = String(seconds); send({ t: "set_reaction_seconds", reactionSeconds: seconds }); });
    el.nameInput.addEventListener("change", () => { const name = normalizeName(el.nameInput.value); el.nameInput.value = name; if (state.connected) send({ t: "set_name", name }); });
    loadMobilePortraitUi();
    applyUrlParams();
  </script>
